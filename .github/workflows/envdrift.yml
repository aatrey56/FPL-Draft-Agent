name: Env Drift

on:
  pull_request:
  push:
    branches: [main]

jobs:
  envdrift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check .env.example drift
        run: npx -y github:jszzr/envdrift#v0.1.0 . --example .env.example --include apps
